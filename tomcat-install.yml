---
- name: Install Tomcat on Ubuntu 22.04
  hosts: all
  become: yes
  vars:
    tomcat_version: "10.1.24"
    tomcat_user: "tomcat"
    tomcat_group: "tomcat"
    tomcat_home: "/opt/tomcat"
    java_package: "openjdk-11-jdk"

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install Java JDK
      apt:
        name: "{{ java_package }}"
        state: present

    - name: Verify Java installation
      command: java -version
      register: java_version
      changed_when: false

    - name: Display Java version
      debug:
        msg: "{{ java_version.stderr_lines[0] }}"

    - name: Create Tomcat user
      user:
        name: "{{ tomcat_user }}"
        shell: /bin/false
        home: "{{ tomcat_home }}"
        createhome: no
        state: present

    - name: Create Tomcat group
      group:
        name: "{{ tomcat_group }}"
        state: present

    - name: Download Tomcat
      get_url:
        url: "https://archive.apache.org/dist/tomcat/tomcat-10/v{{ tomcat_version }}/bin/apache-tomcat-{{ tomcat_version }}.tar.gz"
        dest: "/tmp/apache-tomcat-{{ tomcat_version }}.tar.gz"
        mode: '0755'

    - name: Create Tomcat home directory
      file:
        path: "{{ tomcat_home }}"
        state: directory
        owner: "{{ tomcat_user }}"
        group: "{{ tomcat_group }}"
        mode: '0755'

    - name: Extract Tomcat archive
      unarchive:
        src: "/tmp/apache-tomcat-{{ tomcat_version }}.tar.gz"
        dest: "{{ tomcat_home }}"
        owner: "{{ tomcat_user }}"
        group: "{{ tomcat_group }}"
        remote_src: yes
        extra_opts: ['--strip-components=1']

    - name: Set permissions on Tomcat directories
      file:
        path: "{{ tomcat_home }}/{{ item }}"
        owner: "{{ tomcat_user }}"
        group: "{{ tomcat_group }}"
        recurse: yes
        state: directory
      loop:
        - bin
        - webapps
        - logs
        - temp
        - work

    - name: Create systemd service file
      copy:
        content: |
          [Unit]
          Description=Apache Tomcat Web Application Container
          After=network.target

          [Service]
          Type=forking
          User={{ tomcat_user }}
          Group={{ tomcat_group }}
          Environment="JAVA_HOME=/usr/lib/jvm/java-11-openjdk-amd64"
          Environment="CATALINA_HOME={{ tomcat_home }}"
          Environment="CATALINA_BASE={{ tomcat_home }}"
          ExecStart={{ tomcat_home }}/bin/startup.sh
          ExecStop={{ tomcat_home }}/bin/shutdown.sh
          Restart=on-failure
          RestartSec=5s

          [Install]
          WantedBy=multi-user.target
        dest: /etc/systemd/system/tomcat.service
        mode: '0644'

    - name: Reload systemd daemon
      systemd:
        daemon_reload: yes

    - name: Enable Tomcat service
      systemd:
        name: tomcat
        enabled: yes

    - name: Start Tomcat service
      systemd:
        name: tomcat
        state: started

    - name: Wait for Tomcat to start
      wait_for:
        port: 8080
        delay: 5
        timeout: 30

    - name: Display Tomcat status
      debug:
        msg: "Tomcat has been successfully installed and started on port 8080"

    - name: Clean up downloaded archive
      file:
        path: "/tmp/apache-tomcat-{{ tomcat_version }}.tar.gz"
        state: absent